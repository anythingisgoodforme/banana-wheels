<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🎮 Banana Wheels - Game</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>🍌 BANANA WHEELS! 🎮</h1>
        <p>Learn JavaScript Game Development</p>
      </header>

      <main>
        <div class="game-section">
          <div class="game-panel" id="gamePanel">
            <button
              id="fullscreenButton"
              class="fullscreen-button"
              type="button"
              aria-label="Toggle fullscreen"
            >
              Full Screen
            </button>
            <canvas id="gameCanvas" width="1000" height="850"></canvas>
          </div>
          <div class="info">
            <div class="controls">
              <h3>🎮 Controls</h3>
              <p>
                <strong>Arrow Keys or A/D:</strong> Move
              </p>
              <p>
                <strong>Arrow Keys or W:</strong> Jump
              </p>
              <p>
                <strong>space:</strong> Pause
              </p>
            </div>
            <div class="stats">
              <h3>📊 Game Stats</h3>
              <p>
                Score: <span id="score">0</span>
              </p>
              <p>
                Lives: <span id="lives">1</span>
              </p>
              <p>
                Level: <span id="level">1</span>
              </p>
            </div>
          </div>
        </div>
      </main>

      <footer>
        <p>
          Built with ❤️ using JavaScript | Read
          <a href="CONTRIBUTING.md">CONTRIBUTING.md</a> for best practices
        </p>
      </footer>
    </div>

    <!-- Game script -->
    <script src="game.js"></script>
  </body>
</html>
